<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoLeaf – Teacher Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page-shell">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark" aria-hidden="true">&gt;</span>
      <span>LingoLeaf</span>
    </a>
    <div class="header-actions">
      <span class="header-badge" id="userBadge"></span>
      <button class="reset-button" id="signOutBtn" type="button">Sign out</button>
    </div>
  </header>

  <main>
    <section class="hero hero--compact">
      <p class="eyebrow">TEACHER</p>
      <h1>Create translation <em>exercises</em></h1>
      <p class="hero-copy">Build exercises, share links with students, and review scores and submissions.</p>
    </section>

    <section class="grader">
      <h2 class="section-title">Create new exercise</h2>

      <form id="createExerciseForm" class="stack-form">
        <label for="exerciseTitle">Exercise title</label>
        <input id="exerciseTitle" type="text" required maxlength="200" placeholder="Lesson 1: Introduce yourself" />

        <label for="exercisePrompt">Text to translate</label>
        <textarea id="exercisePrompt" required maxlength="5000" placeholder="Enter the sentence or passage to translate..."></textarea>

        <label for="exerciseAnswer">Model answer (teachers only)</label>
        <textarea id="exerciseAnswer" required maxlength="5000" placeholder="Enter the model answer for grading..."></textarea>

        <p class="form-error" id="createError" hidden></p>
        <button class="translate-button" type="submit">Create exercise</button>
      </form>
    </section>

    <section class="grader" id="sharePanel" hidden>
      <h2 class="section-title">Share link with students</h2>
      <p class="panel-copy">Send this link to students. They will not see the model answer.</p>
      <div class="share-row">
        <input id="shareLink" type="text" readonly />
        <button class="reset-button" id="copyLinkBtn" type="button">Copy</button>
      </div>
    </section>

    <section class="grader">
      <div class="section-header-row">
        <h2 class="section-title">Your exercises</h2>
        <button class="reset-button" id="refreshBtn" type="button">Refresh</button>
      </div>
      <div id="exerciseList" class="exercise-list">
        <p class="empty-state">Loading...</p>
      </div>
    </section>

    <section class="grader" id="submissionsPanel" hidden>
      <div class="section-header-row">
        <h2 class="section-title" id="submissionsTitle">Submissions</h2>
        <button class="reset-button" id="closeSubmissionsBtn" type="button">Close</button>
      </div>
      <div id="submissionsList" class="submission-list"></div>
    </section>
  </main>
</div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/teacher.js"></script>
</body>
</html>

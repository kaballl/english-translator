<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoLeaf – Student</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page-shell">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark" aria-hidden="true">&gt;</span>
      <span>LingoLeaf</span>
    </a>
    <div class="header-actions">
      <span class="header-badge" id="userBadge"></span>
      <button class="reset-button" id="signOutBtn" type="button">Sign out</button>
    </div>
  </header>

  <main>
    <section class="hero hero--compact">
      <p class="eyebrow">STUDENT</p>
      <h1>Practice translation <em>every day</em></h1>
      <p class="hero-copy">Open an exercise link from your teacher, or review your past submissions.</p>
    </section>

    <section class="grader">
      <h2 class="section-title">Open exercise by link</h2>
      <p class="panel-copy">Paste the exercise link from your teacher here:</p>
      <form id="openLinkForm" class="share-row">
        <input id="exerciseLinkInput" type="url" required placeholder="https://.../exercise.html?id=..." />
        <button class="translate-button" type="submit">Open</button>
      </form>
    </section>

    <section class="grader">
      <h2 class="section-title">Submitted exercises</h2>
      <div id="historyList" class="submission-list">
        <p class="empty-state">Loading...</p>
      </div>
    </section>
  </main>
</div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/student.js"></script>
</body>
</html>

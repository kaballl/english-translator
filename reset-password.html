<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoLeaf – Reset password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page-shell page-shell--narrow">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark" aria-hidden="true">&gt;</span>
      <span>LingoLeaf</span>
    </a>
  </header>

  <main>
    <section class="auth-card" id="resetPanel" hidden>
      <p class="eyebrow">NEW PASSWORD</p>
      <h1>Set a new password</h1>
      <p class="auth-subtitle">Choose a new password for your account.</p>

      <form id="resetForm" class="auth-form">
        <label for="newPassword">New password</label>
        <input id="newPassword" type="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters" />

        <label for="confirmPassword">Confirm password</label>
        <input id="confirmPassword" type="password" required minlength="6" autocomplete="new-password" placeholder="Repeat your password" />

        <p class="form-error" id="resetError" hidden></p>
        <p class="form-success" id="resetSuccess" hidden></p>

        <button class="translate-button auth-submit" type="submit">Update password</button>
      </form>
    </section>

    <section class="auth-card" id="resetErrorPanel" hidden>
      <p class="eyebrow">RESET PASSWORD</p>
      <h1>Link expired</h1>
      <p class="auth-subtitle" id="resetErrorMessage">This reset link is invalid or has expired.</p>
      <a class="translate-button inline-link" href="login.html">Back to sign in</a>
    </section>
  </main>
</div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/reset-password.js"></script>
</body>
</html>

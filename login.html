<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoLeaf – Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page-shell page-shell--narrow">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark" aria-hidden="true">&gt;</span>
      <span>LingoLeaf</span>
    </a>
  </header>

  <main>
    <section class="auth-card">
      <p class="eyebrow">SIGN IN</p>
      <h1>Welcome back</h1>
      <p class="auth-subtitle">Sign in to continue your translation practice.</p>

      <form id="loginForm" class="auth-form">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" required autocomplete="email" placeholder="you@example.com" />

        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" required autocomplete="current-password" placeholder="••••••••" />

        <p class="form-error" id="loginError" hidden></p>

        <button class="translate-button auth-submit" type="submit">Sign in</button>
      </form>

      <p class="auth-switch">
        Don't have an account?
        <button type="button" class="link-button" id="showSignup">Sign up</button>
      </p>
    </section>

    <section class="auth-card" id="signupCard" hidden>
      <p class="eyebrow">SIGN UP</p>
      <h1>Create an account</h1>
      <p class="auth-subtitle">Register as a student to complete exercises from your teacher.</p>

      <form id="signupForm" class="auth-form">
        <label for="signupName">Full name</label>
        <input id="signupName" type="text" required autocomplete="name" placeholder="Jane Smith" />

        <label for="signupEmail">Email</label>
        <input id="signupEmail" type="email" required autocomplete="email" placeholder="you@example.com" />

        <label for="signupPassword">Password</label>
        <input id="signupPassword" type="password" required minlength="6" autocomplete="new-password" placeholder="At least 6 characters" />

        <p class="form-error" id="signupError" hidden></p>
        <p class="form-success" id="signupSuccess" hidden></p>

        <button class="translate-button auth-submit" type="submit">Sign up</button>
      </form>

      <p class="auth-switch">
        Already have an account?
        <button type="button" class="link-button" id="showLogin">Sign in</button>
      </p>
    </section>
  </main>
</div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>

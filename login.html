<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LingoLeaf – Đăng nhập</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="page-shell page-shell--narrow">
  <header class="site-header">
    <a class="brand" href="index.html">
      <span class="brand-mark" aria-hidden="true">&gt;</span>
      <span>LingoLeaf</span>
    </a>
  </header>

  <main>
    <section class="auth-card">
      <p class="eyebrow">ĐĂNG NHẬP</p>
      <h1>Chào mừng trở lại</h1>
      <p class="auth-subtitle">Đăng nhập để tiếp tục luyện dịch.</p>

      <form id="loginForm" class="auth-form">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" required autocomplete="email" placeholder="you@example.com" />

        <label for="loginPassword">Mật khẩu</label>
        <input id="loginPassword" type="password" required autocomplete="current-password" placeholder="••••••••" />

        <p class="form-error" id="loginError" hidden></p>

        <button class="translate-button auth-submit" type="submit">Đăng nhập</button>
      </form>

      <p class="auth-switch">
        Chưa có tài khoản?
        <button type="button" class="link-button" id="showSignup">Đăng ký</button>
      </p>
    </section>

    <section class="auth-card" id="signupCard" hidden>
      <p class="eyebrow">ĐĂNG KÝ</p>
      <h1>Tạo tài khoản</h1>
      <p class="auth-subtitle">Chọn vai trò của bạn khi đăng ký.</p>

      <form id="signupForm" class="auth-form">
        <label for="signupName">Họ tên</label>
        <input id="signupName" type="text" required autocomplete="name" placeholder="Nguyễn Văn A" />

        <label for="signupEmail">Email</label>
        <input id="signupEmail" type="email" required autocomplete="email" placeholder="you@example.com" />

        <label for="signupPassword">Mật khẩu</label>
        <input id="signupPassword" type="password" required minlength="6" autocomplete="new-password" placeholder="Tối thiểu 6 ký tự" />

        <fieldset class="role-picker">
          <legend>Vai trò</legend>
          <label class="role-option">
            <input type="radio" name="role" value="student" checked />
            <span>
              <strong>Học viên</strong>
              <small>Làm bài tập qua link giáo viên gửi</small>
            </span>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="teacher" />
            <span>
              <strong>Giáo viên</strong>
              <small>Tạo bài tập và xem bài nộp</small>
            </span>
          </label>
        </fieldset>

        <p class="form-error" id="signupError" hidden></p>
        <p class="form-success" id="signupSuccess" hidden></p>

        <button class="translate-button auth-submit" type="submit">Đăng ký</button>
      </form>

      <p class="auth-switch">
        Đã có tài khoản?
        <button type="button" class="link-button" id="showLogin">Đăng nhập</button>
      </p>
    </section>
  </main>
</div>

<script src="js/config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>
</body>
</html>
